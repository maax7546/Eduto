<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Web App</title>

    <link rel="stylesheet" href="global/ui/bundleimport/global-bundleimport.css">
    <link rel="stylesheet" href="global/ui/bundleimport/menu-bundleimport.css">
    <link rel="stylesheet" href="index-visuals.css">

    <style>
        /* Positioniert den Test-Button unten rechts in der Ecke */
        .test-corner-btn {
            position: fixed; /* Fixiert an der Bildschirmposition, unabhängig vom Scrollen */
            bottom: 10px;    /* Abstand von unten */
            right: 10px;     /* Abstand von rechts */
            background: rgba(0,0,0,0.1);
            color: #555;
            text-decoration: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-family: sans-serif;
            z-index: 2000; /* Sehr hoher Wert, um über allem zu liegen */
            border: 1px solid rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .test-corner-btn:hover {
            background: rgba(0,0,0,0.2);
        }

        /* Sprach-Umschalter (nur auf index.html) — oben rechts, zeigt die
           Flagge der AKTUELLEN Sprache (DE → Deutschland, EN → UK). */
        .lang-toggle {
            position: fixed;
            top: 8px;
            right: 12px;
            z-index: 2500;
            width: 54px;
            height: 36px;
            padding: 0;
            border: 2px solid rgba(0,0,0,0.18);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .lang-toggle:hover  { transform: scale(1.06); }
        .lang-toggle:active { transform: scale(0.95); }
        .lang-flag, .lang-flag svg { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <header class="header"></header>

    <main class="main-container">
        <div class="menu-grid">

            <a href="modules/math/menu-math.html" class="big-menu-btn blue">
                <span class="btn-title">Mathe</span>
                <div class="visual-comparison">
                    <span>1</span>
                    <span class="symbol">+</span>
                    <span>2</span>
                </div>
            </a>

            <a href="modules/quiz/wettkampf/menu-wettkampf.html" class="big-menu-btn red">
                <span class="btn-title">Quiz (BETA)</span>
                <div class="visual-quiz">
                    <span class="vq-red">🔴</span>
                    <span class="vq-ball">⚽</span>
                    <span class="vq-blue">🔵</span>
                </div>
            </a>

            <a href="modules/werkzeuge/einteilung/menu-einteilung.html" class="big-menu-btn teal">
                <span class="btn-title">Werkzeuge</span>
                <div class="visual-einteilung-home">
                    <span>🙂🙂</span>
                    <span>🙂🙂</span>
                </div>
            </a>

        </div>
    </main>

    <button id="lang-toggle" class="lang-toggle" type="button"
            title="Sprache wechseln / Switch language" aria-label="Sprache wechseln">
        <span class="lang-flag" id="lang-flag"></span>
    </button>

    <a href="testutility/testutility.html" class="test-corner-btn" style="display:none;">🔧 Test</a>

    <script src="global/ui/ui.js?v=2"></script>
    <script>
        if (typeof injectUI === 'function') {
            injectUI('index', {
                title: 'Teacher Web App',
                showExit: false
            });
        }

        // SPRACH-UMSCHALTER (nur hier auf index.html). Zeigt die Flagge der
        // aktuellen Sprache; Klick wechselt de⇄en über die globale I18n-Engine.
        // Inline-SVG-Flaggen (statt Emoji-Flaggen, die unter Windows fehlen).
        (function () {
            var DE = '<svg viewBox="0 0 5 3" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">'
                   + '<rect width="5" height="3" fill="#000"/>'
                   + '<rect width="5" height="2" y="1" fill="#D00"/>'
                   + '<rect width="5" height="1" y="2" fill="#FFCE00"/></svg>';
            var UK = '<svg viewBox="0 0 60 30" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">'
                   + '<clipPath id="ukc"><rect width="60" height="30"/></clipPath>'
                   + '<g clip-path="url(#ukc)">'
                   + '<rect width="60" height="30" fill="#012169"/>'
                   + '<path d="M0,0 60,30 M60,0 0,30" stroke="#fff" stroke-width="6"/>'
                   + '<path d="M0,0 60,30 M60,0 0,30" stroke="#C8102E" stroke-width="4"/>'
                   + '<path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>'
                   + '<path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></g></svg>';

            var flag = document.getElementById('lang-flag');
            var btn  = document.getElementById('lang-toggle');
            function render(lang) { flag.innerHTML = (lang === 'en') ? UK : DE; }

            // I18n wird via ui.js asynchron nachgeladen → kurz warten.
            (function wire() {
                if (!window.I18n) { setTimeout(wire, 60); return; }
                render(window.I18n.getLanguage());
                btn.addEventListener('click', function () { render(window.I18n.toggle()); });
                window.addEventListener('languageChanged', function (e) { render(e.detail.lang); });
            })();
        })();

        // Versteckter Zugang zur Testseite: Strg+Shift+T → Passwort abfragen.
        document.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 't' || e.key === 'T')) {
                e.preventDefault();
                var eingabe = prompt('Passwort eingeben:');
                if (eingabe === null) return; // Abgebrochen
                if (eingabe === '6767') {
                    window.location.href = 'testutility/testutility.html';
                } else {
                    alert('Falsches Passwort.');
                }
            }
        });
    </script>
</body>
</html>

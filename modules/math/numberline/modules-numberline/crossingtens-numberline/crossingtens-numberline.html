<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zehnerübergang am Zahlenstrahl</title>

    <link rel="stylesheet" href="../../../../../global/ui/bundleimport/global-bundleimport.css">
    <link rel="stylesheet" href="../../../../../global/ui/bundleimport/ui-bundleimport.css">
    <link rel="stylesheet" href="../../../../../global/math/bundleimport/math-bundleimport.css">

    <link rel="stylesheet" href="crossingtens-numberline.css">
</head>
<body>

    <header class="header"></header>

    <main id="game-container">

        <div id="taskPanel" class="task-panel">
            <div id="taskEquation" class="task-equation">&nbsp;</div>
        </div>

        <div id="viewport" class="viewport">
            <div id="numberlineWrapper" class="numberline-wrapper">
                <div id="numberline" class="numberline"></div>
            </div>
            <svg id="arrowLayer" class="arrow-layer"></svg>
            <!-- Unsichtbarer Geometrie-Anker für das Tutorial-Spotlight über den
                 Pfeilen (Größe/Position setzt das Modul-JS in updateArrowBand). -->
            <div id="ct-arrow-band" class="ct-arrow-band"></div>
        </div>

        <!-- Antwort-Optionen: erscheinen erst, wenn alle drei Pfeile gezogen sind -->
        <div id="ct-options" class="options-container"></div>

    </main>

    <script src="../../../../../global/ui/ui.js?v=3"></script>
    <script src="../../../../../global/ui/bundleimport/ui-bundleimport.js"></script>
    <script src="../../../../../global/math/bundleimport/math-bundleimport.js"></script>

    <script src="ui-crossingtens-numberline.js"></script>
    <script src="crossingtens-numberline.js"></script>
</body>
</html>

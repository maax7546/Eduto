<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlenstrahl Modul</title>
    
    <link rel="stylesheet" href="../../../../../global/ui/bundleimport/global-bundleimport.css">
    <link rel="stylesheet" href="../../../../../global/ui/bundleimport/ui-bundleimport.css">
    <link rel="stylesheet" href="../../../../../global/math/bundleimport/math-bundleimport.css">
    <link rel="stylesheet" href="assign-numberline.css">
</head>
<body>

    <header class="header"></header>

<main id="game-container">
    <div id="viewport" class="viewport">
        <div id="numberlineWrapper" class="numberline-wrapper">
            <div id="numberline" class="numberline"></div>
        </div>
    </div>

    <div class="symbol-container">
        <div id="nb-1" class="nb-box nb-option nb-box-small" draggable="true" data-value="1">1</div>
        <div id="nb-2" class="nb-box nb-option nb-box-small" draggable="true" data-value="2">2</div>
        <div id="nb-3" class="nb-box nb-option nb-box-small" draggable="true" data-value="3">3</div>
        <div id="nb-4" class="nb-box nb-option nb-box-small" draggable="true" data-value="4">4</div>
        <div id="nb-5" class="nb-box nb-option nb-box-small" draggable="true" data-value="5">5</div>
        <div id="nb-6" class="nb-box nb-option nb-box-small" draggable="true" data-value="6">6</div>
        <div id="nb-7" class="nb-box nb-option nb-box-small" draggable="true" data-value="7">7</div>
        <div id="nb-8" class="nb-box nb-option nb-box-small" draggable="true" data-value="8">8</div>
        <div id="nb-9" class="nb-box nb-option nb-box-small" draggable="true" data-value="9">9</div>
        <div id="nb-10" class="nb-box nb-option nb-box-small" draggable="true" data-value="10">10</div>

        <button id="btnCheck">✓</button>
    </div>
</main>

    <script src="../../../../../global/ui/ui.js?v=3"></script>
    <script src="../../../../../global/ui/bundleimport/ui-bundleimport.js"></script>
    <script src="../../../../../global/math/bundleimport/math-bundleimport.js"></script>
    
    <script src="assign-numberline.js?v=2"></script>
    <!-- Kopfzeilen-Titel = Button-Text; von der geteilten ui-numberline.js gelesen. -->
    <script>window.NUMBERLINE_TITLE = 'Zahlen zuordnen';</script>
    <script src="../../ui-numberline/ui-numberline.js"></script>
</body>
</html>

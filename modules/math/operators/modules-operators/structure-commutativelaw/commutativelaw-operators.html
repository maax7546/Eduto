<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kommutativgesetz - Tauschaufgaben</title>
    
    <link rel="stylesheet" href="../../../../../global/ui/bundleimport/global-bundleimport.css">
    <link rel="stylesheet" href="../../../../../global/ui/bundleimport/ui-bundleimport.css">
    <link rel="stylesheet" href="../../../../../global/math/bundleimport/math-bundleimport.css">

    <link rel="stylesheet" href="commutativelaw-operators.css">
    <link rel="stylesheet" href="animation-commutativelaw-operators.css">
</head>
<body>

    <header class="header"></header>

    <div class="game-container">
        <div class="anim-spacer"></div>

        <div class="equation-area" id="equation-area">
            <div id="slot-1" class="nb-box nb-card"></div>
            
            <div id="sym-plus" class="nb-box nb-ghost nb-symbol">+</div>
            
            <div id="slot-2" class="nb-box nb-card"></div>
            
            <div id="sym-equal" class="nb-box nb-ghost nb-symbol">=</div>
            
            <div id="slot-3" class="nb-box nb-card nb-slot-question">?</div>
        </div>

        <div class="anim-spacer"></div>

        <div class="options-container" id="options-container"></div>
    </div>

    <script src="../../../../../global/ui/ui.js?v=2"></script>
    <script src="../../../../../global/ui/bundleimport/ui-bundleimport.js"></script>
    <script src="../../../../../global/math/bundleimport/math-bundleimport.js"></script>
    <script src="../../ui-operators/ui-operators.js"></script>
    <script src="commutativelaw-operators.js"></script>
    <script src="animation-commutativelaw-operators.js"></script>
    
    <script>
        // Initialisierung der UI über das globale Framework
        if (typeof injectUI === 'function') {
            injectUI('game', {
                title: 'Kommutativgesetz',
                showBack: true,
                showSettings: true,
                showExit: true,
                showFullscreen: true,
                exitUrl: '../../../../../index.html'
            });
        }
    </script>
</body>
</html>

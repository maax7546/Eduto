<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zahlenfolgen</title>
    <link rel="stylesheet" href="../../../../../global/ui/bundleimport/global-bundleimport.css">
    <link rel="stylesheet" href="../../../../../global/ui/bundleimport/ui-bundleimport.css">
    <link rel="stylesheet" href="../../../../../global/math/bundleimport/math-bundleimport.css">
    <link rel="stylesheet" href="numbersequence-operators.css">
</head>
<body>

    <header class="header"></header>

    <div class="game-container" data-autofit>
        <!-- OBEN: feste Zahlenfolge 0–20 als „Schlange". Hier hüpft der Frosch.
             Frosch + Steine liegen IM #seq-snake (gemeinsamer offsetParent). -->
        <div class="seq-snake-stage" id="seq-snake-stage">
            <!-- Frosch-Steuerung links neben der 0–20-Folge, vertikal mittig:
                 Sprung (Frosch hüpft eins weiter) + Zurücksetzen (Frosch an den
                 zuletzt gelösten Stein zurück, falls man zu weit gesprungen ist). -->
            <div class="seq-jump-wrap">
                <button type="button" id="seq-jump" class="seq-jump-btn" aria-label="Sprung">🐸</button>
                <button type="button" id="seq-reset" class="seq-reset-btn" aria-label="Frosch zurücksetzen">↩</button>
            </div>
            <div id="seq-snake" class="seq-snake">
                <div id="seq-frog" class="seq-frog"><span class="seq-frog-emoji">🐸</span></div>
            </div>
        </div>

        <!-- UNTEN: die gerade Aufgabe — Regel links (mit Frosch-Sprung darunter),
             dann 7 Holzsteine (kein Frosch). -->
        <div class="seq-task-row" id="seq-task-row">
            <div class="seq-rule-col">
                <div class="seq-rule" id="seq-rule">+ 2</div>
            </div>
            <div id="seq-row" class="seq-row"></div>
        </div>

        <!-- Reinziehbare Zahlen-Boxen (die richtige nächste Zahl + Ablenker) -->
        <div class="options-container" id="seq-options"></div>
    </div>

    <script src="../../../../../global/ui/ui.js?v=3"></script>
    <script src="../../../../../global/ui/bundleimport/ui-bundleimport.js"></script>
    <script src="../../../../../global/math/bundleimport/math-bundleimport.js"></script>
    <script src="ui-numbersequence-operators.js"></script>
    <script src="numbersequence-operators.js"></script>

    <script>
        if (typeof injectUI === 'function') {
            injectUI('game', {
                title: 'Zahlenfolgen (BETA)',
                showBack: true,
                showSettings: true,
                showExit: true,
                showFullscreen: true,
                showHelp: true,
                exitUrl: '../../../../../index.html'
            });
        }
    </script>
</body>
</html>
